{% extends "base_modern.html" %}
{% load static %}
{% block content %}
<head>
    <meta charset="UTF-8">
    <title>Server Error | Kenrish Collection</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8fcfc 60%, #eaf4fb 100%);
        }
        .kenrish-error-card {
            background: var(--kenrish-card, #f8fcfc);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(53, 122, 184, 0.10), 0 1.5px 8px 0 #d17a4b22;
            padding: 2.5rem 1.5rem;
            max-width: 420px;
            margin: 3rem auto;
        }
        .kenrish-error-logo {
            max-width: 100px;
            border-radius: 1rem;
            box-shadow: 0 2px 12px #ffb34722;
        }
        .kenrish-error-title {
            color: var(--kenrish-turquoise, #1abc9c);
            font-weight: 800;
            letter-spacing: 1px;
        }
        .kenrish-error-btn {
            background: linear-gradient(90deg, var(--kenrish-turquoise, #1abc9c), var(--kenrish-gold, #ffb347));
            color: #fff;
            border: none;
            border-radius: 2rem;
            font-weight: 700;
            padding: 0.7rem 2.2rem;
            margin-top: 1.5rem;
            box-shadow: 0 2px 8px #1abc9c33;
            transition: background 0.2s;
        }
        .kenrish-error-btn:hover {
            background: linear-gradient(90deg, var(--kenrish-gold, #ffb347), var(--kenrish-turquoise, #1abc9c));
            color: #fff;
        }
        .dark-mode {
            background: #121212;
            color: #e0e0e0;
        }
        .dark-mode .kenrish-error-card {
            background: #1e1e1e;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), 0 1.5px 8px 0 #ffffff22;
        }
        .dark-mode .kenrish-error-title {
            color: #1abc9c;
        }
        .dark-mode .kenrish-error-btn {
            background: linear-gradient(90deg, #1abc9c, #ffb347);
            color: #fff;
        }
        body, .kenrish-error-card, .kenrish-error-title, .kenrish-error-btn {
            font-family: 'Nunito', Arial, Helvetica, sans-serif !important;
        }
    </style>
</head>
<body>
    <div class="kenrish-error-card text-center">
        <img src="{% static 'kenrish.png' %}" alt="Kenrish Collection" class="kenrish-error-logo mb-4">
        <h1 class="kenrish-error-title display-5 mb-3">Something Went Wrong</h1>
        <p class="text-muted fs-5 mb-4">Sorry, an unexpected error occurred. Please try again later.</p>
        <a href="{% url 'home' %}" class="kenrish-error-btn">Go to Home</a>
    </div>
    <button id="darkModeToggle" class="btn btn-outline-secondary rounded-pill ms-2" style="position:fixed;bottom:24px;right:24px;z-index:9999;">
        <i class="bi bi-moon"></i>
    </button>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggle = document.getElementById('darkModeToggle');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const saved = localStorage.getItem('kenrish-dark-mode');
        if (saved === 'on' || (!saved && prefersDark)) {
            document.body.classList.add('dark-mode');
        }
        toggle.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('kenrish-dark-mode', document.body.classList.contains('dark-mode') ? 'on' : 'off');
        });
    });
    </script>
</body>
{% endblock %}
