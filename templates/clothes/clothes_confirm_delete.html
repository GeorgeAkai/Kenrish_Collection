{% extends "base_modern.html" %}
{% block title %}Delete • {{ item.name }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="mx-auto" style="max-width: 720px;">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <h3 class="fw-bold mb-3" style="color: var(--kenrish-turquoise);">
          <i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete
        </h3>
        <p class="lead mb-4">
          Are you sure you want to delete <strong>{{ item.name }}</strong>? This action cannot be undone.
        </p>
        <form method="post" class="d-flex gap-2">
          {% csrf_token %}
          <button class="btn btn-danger rounded-pill shadow-sm">
            <i class="bi bi-trash"></i> Delete
          </button>
          <a href="{% url 'clothes-detail' item.pk %}" class="btn btn-outline-secondary rounded-pill shadow-sm">
            Cancel
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
