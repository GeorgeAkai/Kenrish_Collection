{% extends "base_modern.html" %}
{% block title %}{{ action }} Gallery Image{% endblock %}
{% block content %}
<div class="container py-5">
    <h2 class="mb-4">{{ action }} Gallery Image</h2>
    <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm rounded-4" style="max-width: 500px; margin:auto;">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="file" name="file" accept="image/*,video/*">
        <button type="submit" class="btn btn-primary rounded-pill">{{ action }}</button>
        <a href="{% url 'gallery' %}" class="btn btn-outline-secondary rounded-pill ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
