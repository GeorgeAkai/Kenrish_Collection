{% extends "base_modern.html" %}

{% block title %}Add Stock - Kenrish Collection{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header card-header-turquoise text-center">
                        <h2 class="mb-0">
                            <i class="bi bi-plus-circle me-2"></i>Add Stock
                        </h2>
                        <p class="mb-0 mt-2">Add inventory and track expenses</p>
                    </div>
                    <div class="card-body p-4">
                        <form method="post">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Item Type</label>
                                    <select name="item_type" class="form-select" required>
                                        <option value="">Select Type</option>
                                        <option value="product">Product</option>
                                        <option value="handbag">Handbag</option>
                                    </select>
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Item</label>
                                    <select name="item_id" class="form-select" required>
                                        <option value="">Select Item</option>
                                        {% for product in products %}
                                        <option value="{{ product.id }}" data-type="product">{{ product.name }}</option>
                                        {% endfor %}
                                        {% for handbag in handbags %}
                                        <option value="{{ handbag.id }}" data-type="handbag">{{ handbag.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Quantity</label>
                                    <input type="number" name="quantity" class="form-control" min="1" required>
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-danger">Total Cost Paid (Ksh) *</label>
                                    <input type="number" name="total_cost" class="form-control" step="0.01" min="0.01" required>
                                    <small class="text-muted">Total amount paid for this stock purchase</small>
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">New Selling Price (Ksh)</label>
                                    <input type="number" name="new_price" class="form-control" step="0.01" min="0" placeholder="Optional">
                                    <small class="text-muted">Leave empty to keep current price</small>
                                </div>
                                
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Notes</label>
                                    <textarea name="notes" class="form-control" rows="3" placeholder="Optional notes about this stock addition"></textarea>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-3 mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle me-2"></i>Add Stock
                                </button>
                                <a href="{% url 'inventory-dashboard' %}" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
