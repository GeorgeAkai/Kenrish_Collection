{% extends "base_modern.html" %}
{% block title %}Delete Handbag{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow rounded-4 p-4 border-0" style="background: #f4faff;">
                <h2 class="text-center mb-4 fw-bold" style="color: #d17a4b;">
                    <i class="bi bi-trash"></i> Delete Handbag
                </h2>
                <p>Are you sure you want to delete <strong>{{ handbag.name }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                    <a href="{% url 'handbags' %}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
{% endblock %}
