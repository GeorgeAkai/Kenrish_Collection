{% extends "base_modern.html" %}

{% block content %}
{% load static %}
<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found | Kenrish Collection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Nunito font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap (optional, for button style) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        :root {
            --kenrish-gold: #ffb347;
            --kenrish-turquoise: #1abc9c;
            --kenrish-turquoise-dark: #009688;
            --kenrish-bg: #f8fcfc;
            --kenrish-card: #ffffff;
        }
        html, body {
            height: 100%;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fcfc 60%, #eaf4fb 100%);
            font-family: 'Nunito', Arial, Helvetica, sans-serif !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .kenrish-error-card {
            background: var(--kenrish-card);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(53, 122, 184, 0.10), 0 1.5px 8px 0 #d17a4b22;
            padding: 2.5rem 1.5rem 2rem 1.5rem;
            max-width: 420px;
            margin: 2rem auto;
            text-align: center;
            animation: kenrish-fadein 1s;
        }
        @keyframes kenrish-fadein {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: none;}
        }
        .kenrish-error-logo {
            max-width: 90px;
            border-radius: 1rem;
            box-shadow: 0 2px 12px #ffb34722;
            margin-bottom: 1.5rem;
            animation: kenrish-pulse 6s ease-in-out infinite;
        }
        @keyframes kenrish-pulse {
            0%, 100% { transform: scale(1);}
            50% { transform: scale(1.08);}
        }
        .kenrish-error-title {
            color: var(--kenrish-turquoise);
            font-weight: 900;
            letter-spacing: 1px;
            font-size: 2.2rem;
            margin-bottom: 0.7rem;
        }
        .kenrish-error-code {
            font-size: 5rem;
            font-weight: 900;
            color: var(--kenrish-gold);
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 12px #ffb34722;
        }
        .kenrish-error-desc {
            color: #666;
            font-size: 1.18rem;
            margin-bottom: 1.5rem;
        }
        .kenrish-error-btn {
            background: linear-gradient(90deg, var(--kenrish-turquoise), var(--kenrish-gold));
            color: #fff;
            border: none;
            border-radius: 2rem;
            font-weight: 700;
            padding: 0.7rem 2.2rem;
            margin-top: 0.5rem;
            box-shadow: 0 2px 8px #1abc9c33;
            transition: background 0.2s, color 0.2s;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-block;
        }
        .kenrish-error-btn:hover {
            background: linear-gradient(90deg, var(--kenrish-gold), var(--kenrish-turquoise));
            color: #fff;
        }
        @media (max-width: 600px) {
            .kenrish-error-card {
                padding: 1.2rem 0.5rem 1.2rem 0.5rem;
                border-radius: 1.2rem;
                max-width: 98vw;
            }
            .kenrish-error-title {
                font-size: 1.3rem;
            }
            .kenrish-error-code {
                font-size: 3.2rem;
            }
            .kenrish-error-logo {
                max-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="kenrish-error-card">
        <img src="{% static 'kenrish.png' %}" alt="Kenrish Collection" class="kenrish-error-logo">
        <div class="kenrish-error-code">404</div>
        <div class="kenrish-error-title">Page Not Found</div>
        <div class="kenrish-error-desc">
            Sorry, the page you are looking for does not exist or has been moved.<br>
            If you believe this is an error, please <a href="mailto:support@kenrish.com" style="color:var(--kenrish-turquoise-dark);text-decoration:underline;">contact us</a>.
        </div>
        <a href="{% url 'home' %}" class="kenrish-error-btn">Go to Home</a>
    </div>
</body>
</html>
{% endblock %}
