{% extends "base_modern.html" %}
{% block title %}Delete Gallery Image{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="card p-4 shadow-sm rounded-4" style="max-width: 500px; margin:auto;">
        <h2 class="mb-3 text-danger">Delete Gallery Image</h2>
        <img src="{{ image.image.url }}" alt="" class="img-fluid rounded mb-3" style="max-height:200px;">
        <p>Are you sure you want to delete this image?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger rounded-pill">Delete</button>
            <a href="{% url 'gallery' %}" class="btn btn-outline-secondary rounded-pill ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
