{% load static %}
<!-- Kenrish AI Chatbot Widget -->
<div id="kenrish-chatbot-widget">
    <button class="kenrish-chat-fab" id="kenrishChatFab" onclick="openChat()" aria-label="Open Kenrish Assistant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8z"/>
        </svg>
        <div class="kenrish-chat-badge">🤖</div>
    </button>

    <div class="kenrish-chat-panel" id="kenrishChatPanel" aria-hidden="true">
        <header class="kenrish-chat-header">
            <div class="kenrish-brand-section">
                <h3>Kenrish Collection</h3>
                <p>Gemini AI Assistant</p>
            </div>
            <div class="kenrish-header-actions">
                <button class="kenrish-min-btn" onclick="closeChat()" aria-label="Minimize chat">−</button>
                <button class="kenrish-close-btn" onclick="closeChat()" aria-label="Close chat">×</button>
            </div>
        </header>
        
        <div class="kenrish-chat-messages" id="kenrishChatMessages"></div>
        
        <div class="kenrish-input-container">
            <textarea class="kenrish-input" id="kenrishChatInput" placeholder="Ask me anything about our products and services..." rows="1"></textarea>
            <button class="kenrish-send-btn" onclick="sendMessage()" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22,2 15,22 11,13 2,9 22,2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<style>
:root {
    --kenrish-primary: var(--heading-color, #0b3e64);
    --kenrish-secondary: var(--link-color, #20b2aa);
    --kenrish-gold: var(--accent-color, #d4af37);
    --kenrish-dark: var(--text-color, #363636);
    --kenrish-gray: var(--text-color-light, #64748b);
    --kenrish-border: var(--border-color, #dad9d3);
    --kenrish-bg: var(--background, #fcfaf4);
    --kenrish-light-bg: var(--light-background, #f8f6f0);
    --kenrish-card-bg: var(--card-background, #ffffff);
}

.kenrish-chat-fab {
    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 10000;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--kenrish-primary), var(--kenrish-secondary));
    border: none;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: kenrish-pulse 2s infinite;
}

.kenrish-chat-fab:hover {
    transform: scale(1.1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

.kenrish-chat-fab svg {
    width: 28px;
    height: 28px;
}

.kenrish-chat-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--kenrish-gold);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    animation: kenrish-bounce 1s infinite;
}

.kenrish-chat-panel {
    position: fixed;
    right: 24px;
    bottom: 100px;
    width: 380px;
    height: 500px;
    background: var(--kenrish-card-bg);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    border: 1px solid var(--kenrish-border);
    display: none;
    flex-direction: column;
    z-index: 9999;
    overflow: hidden;
}

.kenrish-chat-panel.open {
    display: flex;
}

.kenrish-chat-header {
    background: linear-gradient(135deg, var(--kenrish-primary), var(--kenrish-secondary));
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.kenrish-brand-section h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    color: white !important;
}

.kenrish-brand-section p {
    margin: 0;
    font-size: 12px;
    opacity: 1;
    color: white !important;
}

.kenrish-header-actions {
    display: flex;
    gap: 8px;
}

.kenrish-close-btn, .kenrish-min-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: bold;
    transition: background 0.2s;
}

.kenrish-close-btn:hover, .kenrish-min-btn:hover {
    background: rgba(255,255,255,0.3);
}

.kenrish-chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: var(--kenrish-light-bg);
}

.kenrish-message {
    margin-bottom: 12px;
    padding: 12px 16px;
    border-radius: 18px;
    max-width: 85%;
    word-wrap: break-word;
    line-height: 1.4;
    font-size: 14px;
    white-space: pre-wrap;
}

.kenrish-message.user {
    background: var(--kenrish-secondary);
    color: white !important;
    margin-left: auto;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(32, 178, 170, 0.2);
}

.kenrish-message.bot {
    background: var(--kenrish-card-bg);
    color: var(--kenrish-dark);
    border: 1px solid var(--kenrish-border);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.kenrish-message.typing {
    background: var(--kenrish-light-bg);
    color: var(--kenrish-gray);
    font-style: italic;
    animation: kenrish-typing 1.5s infinite;
}

.kenrish-input-container {
    padding: 16px 20px;
    background: var(--kenrish-card-bg);
    border-top: 1px solid var(--kenrish-border);
    display: flex;
    align-items: flex-end;
    gap: 12px;
}

.kenrish-input {
    flex: 1;
    background: var(--kenrish-light-bg);
    border: 1px solid var(--kenrish-border);
    border-radius: 20px;
    padding: 12px 16px;
    font-size: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.15s ease;
    font-family: inherit;
    max-height: 100px;
    min-height: 44px;
    color: var(--kenrish-dark);
}

.kenrish-input:focus {
    border-color: var(--kenrish-secondary);
}

.kenrish-send-btn {
    background: var(--kenrish-secondary);
    border: none;
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
}

.kenrish-send-btn:hover {
    background: var(--kenrish-secondary);
    transform: scale(1.05);
}

.kenrish-send-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.kenrish-send-btn svg {
    width: 20px;
    height: 20px;
}

@keyframes kenrish-pulse {
    0% { box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    50% { box-shadow: 0 8px 25px rgba(32, 178, 170, 0.4); }
    100% { box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
}

@keyframes kenrish-bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-4px); }
    60% { transform: translateY(-2px); }
}

@keyframes kenrish-typing {
    0%, 60%, 100% { opacity: 1; }
    30% { opacity: 0.5; }
}

@media (max-width: 768px) {
    .kenrish-chat-panel {
        width: 100vw !important;
        height: 90vh !important;
        bottom: 0 !important;
        right: 0 !important;
        left: 0 !important;
        top: auto !important;
        border-radius: 0 !important;
        position: fixed !important;
    }
    
    .kenrish-chat-fab {
        right: 20px !important;
        bottom: 20px !important;
    }
}
</style>

<script>
let welcomeShown = false;

function openChat() {
    const panel = document.getElementById('kenrishChatPanel');
    const messages = document.getElementById('kenrishChatMessages');
    const fab = document.getElementById('kenrishChatFab');
    if (panel) {
        panel.classList.add('open');
        panel.style.display = 'flex';
        panel.setAttribute('aria-hidden', 'false');
        if (window.innerWidth <= 768) {
            fab.style.display = 'none';
        }
        if (!welcomeShown && messages.children.length === 0) {
            addMessage("🤖 Hello! I'm your Gemini AI assistant for Kenrish Collection. I can understand natural language and help with products, services, pricing, and more. What would you like to know?", "bot");
            welcomeShown = true;
        }
    }
}

function closeChat() {
    const panel = document.getElementById('kenrishChatPanel');
    const fab = document.getElementById('kenrishChatFab');
    if (panel) {
        panel.classList.remove('open');
        panel.style.display = 'none';
        panel.setAttribute('aria-hidden', 'true');
        fab.style.display = 'flex';
    }
}

function addMessage(text, sender) {
    const messages = document.getElementById('kenrishChatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = 'kenrish-message ' + sender;
    messageDiv.textContent = text;
    messages.appendChild(messageDiv);
    messages.scrollTop = messages.scrollHeight;
    return messageDiv;
}

function showTypingIndicator() {
    const typingMsg = addMessage("🤖 Gemini AI is thinking...", "typing");
    return typingMsg;
}

function removeTypingIndicator(typingMsg) {
    if (typingMsg && typingMsg.parentNode) {
        typingMsg.parentNode.removeChild(typingMsg);
    }
}

async function getGeminiAIResponse(message) {
    try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer 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',
                'Content-Type': 'application/json',
                'HTTP-Referer': window.location.origin,
                'X-Title': 'Kenrish Collection'
            },
            body: JSON.stringify({
                model: 'google/gemma-3n-e2b-it:free',
                messages: [
                    {
                        role: 'system',
                        content: `You are a helpful AI assistant for Kenrish Collection, a beauty salon and products store in Shabaab, Nakuru, Kenya. 

BUSINESS INFO:
- Location: Shabaab, Nakuru, Kenya
- Phone: 0708440390
- Hours: Monday-Saturday 8AM-8PM, Closed Sundays

PRODUCTS & PRICES:
- Cocoa Butter Cream: KSh 1,200 (for dry skin, moisturizing)
- Shea Butter: KSh 900 (sensitive skin, unrefined)
- Foundation: KSh 1,800 (8 shades, all-day coverage)
- Lipstick: KSh 800 (matte/glossy, red/pink/nude/brown)
- Mascara: KSh 1,000 (waterproof, volume & length)
- Hair Care Set: KSh 1,200 (shampoo & conditioner)
- Body Lotions: KSh 600-1,500

SERVICES & PRICES:
- Hair cutting: KSh 800
- Hair styling: KSh 600
- Manicure: KSh 500
- Nail stickons: KSh 300 (last 2-3 weeks)

HANDBAGS:
- Leather handbags: KSh 2,500-6,000
- Colors: Black, Brown, Tan
- Styles: Small purse, Large tote, Professional bags

Always be helpful, friendly, and provide specific pricing. Use emojis appropriately. Keep responses concise but informative. If asked about products not in stock, suggest alternatives and mention we can source special items by calling 0708440390.`
                    },
                    {
                        role: 'user',
                        content: message
                    }
                ],
                max_tokens: 300,
                temperature: 0.7
            })
        });
        
        if (response.ok) {
            const data = await response.json();
            return data.choices[0].message.content;
        } else {
            const errorData = await response.json();
            console.error('API Error:', errorData);
            return "I'm having trouble connecting to my AI brain right now. Please call us at 0708440390 for immediate assistance! 📞";
        }
    } catch (error) {
        console.error('Gemini AI Error:', error);
        return "Sorry, I'm experiencing technical difficulties. Please call 0708440390 for help! 🔧";
    }
}

async function sendMessage() {
    const input = document.getElementById('kenrishChatInput');
    const sendBtn = document.querySelector('.kenrish-send-btn');
    const message = input.value.trim();
    
    if (message) {
        // Add user message
        addMessage(message, 'user');
        input.value = '';
        
        // Disable send button and show typing
        sendBtn.disabled = true;
        const typingIndicator = showTypingIndicator();
        
        // Get Gemini AI response
        const aiResponse = await getGeminiAIResponse(message);
        
        // Remove typing indicator and show AI response
        removeTypingIndicator(typingIndicator);
        addMessage(aiResponse, 'bot');
        
        // Re-enable send button
        sendBtn.disabled = false;
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('kenrishChatInput');
    if (input) {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    }
});
</script>
