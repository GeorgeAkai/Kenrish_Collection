{% extends "base_modern.html" %}
{% block title %}{{ action }} Gallery Image{% endblock %}
{% block content %}
<div class="container py-5" style="background: var(--background); border-radius: 1.5rem;">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow rounded-4 p-4" style="background: var(--background);">
                <h2 class="mb-4 fw-bold text-center" style="color: var(--link-color);">
                    <i class="bi bi-images"></i> {{ action }} Gallery Image
                </h2>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_service" class="form-label fw-semibold" style="color: var(--button-background);">Service</label>
                        {{ form.service }}
                    </div>
                    <div class="mb-3">
                        <label for="id_image" class="form-label fw-semibold" style="color: var(--button-background);">Image</label>
                        {{ form.image }}
                        {% if form.image.value %}
                            <img src="{{ form.image.value.url }}" alt="Current Image" class="img-fluid rounded mt-2" style="max-height:120px;">
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        <label for="id_description" class="form-label fw-semibold" style="color: var(--button-background);">Description</label>
                        {{ form.description }}
                    </div>
                    <div class="mb-3">
                        <label for="id_file" class="form-label fw-semibold" style="color: var(--button-background);">File</label>
                        <input type="file" name="file" accept="image/*,video/*" class="form-control">
                    </div>
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button type="submit" class="btn btn-primary rounded-pill fw-bold shadow-sm px-4" style="background: linear-gradient(90deg, var(--link-color), var(--text-color-light)); border: none;">
                            <i class="bi bi-check-circle"></i> {{ action }}
                        </button>
                        <a href="{% url 'gallery' %}" class="btn btn-outline-secondary rounded-pill px-4" style="color: var(--button-background); border-color: var(--button-background);">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<style>
    /* Inherit base_modern colors; no :root here */
    body {
        background: var(--background) !important;
        color: var(--text-color) !important;
    }
    .container.py-5 {
        background: var(--background);
        border-radius: 1.5rem;
    }
    .card {
        border: none;
        background: var(--background) !important;
        box-shadow: 0 4px 24px rgba(11,62,100,0.06);
    }
    .form-label {
        font-size: 1.08rem;
        color: var(--button-background) !important;
    }
    .form-control, select, textarea {
        border-radius: 2rem;
        border: 1.5px solid var(--border-color);
        background: #fff;
        font-size: 1.08rem;
        color: var(--text-color);
    }
    .form-control:focus, select:focus, textarea:focus {
        border-color: var(--link-color);
        box-shadow: 0 0 0 6px rgba(11,62,100,0.06);
        color: var(--text-color);
    }
    .btn:focus {
        box-shadow: 0 0 0 0.2rem rgba(11,62,100,0.06);
    }
    .btn-primary {
        background: linear-gradient(90deg, var(--link-color), var(--text-color-light)) !important;
        border: none;
        color: #fff !important;
    }
    .btn-outline-secondary {
        border-color: var(--button-background) !important;
        color: var(--button-background) !important;
    }
    .btn-outline-secondary:hover {
        background: var(--button-background) !important;
        color: #fff !important;
        border-color: var(--button-background) !important;
    }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
{% endblock %}

<style>
    /* Ensure colors and hero styles match home_modern */
    * { color: inherit !important; }
    body, .container, .row, .col-lg-6 { color: #363636 !important; }
    h1,h2,h3,h4,h5,h6 { color: #0b3e64 !important; }
    .hero-title { color: #0b3e64 !important; }
    .hero-subtitle { color: #363636 !important; }
    p, .lead, .text-muted { color: #363636 !important; }
    .btn { color: #f2f0e9 !important; }
    .navbar-brand, .nav-link { color: #363636 !important; }

    .hero-section { background: linear-gradient(135deg, var(--light-background) 0%, var(--background) 100%); }
    .service-card { border:1px solid var(--border-color); background:var(--background); }
</style>
