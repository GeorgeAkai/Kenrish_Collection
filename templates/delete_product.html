{% extends "base_modern.html" %}

{% block title %}Delete Product{% endblock %}

{% block content %}
<div class="delete-modal-overlay d-flex justify-content-center align-items-center">
    <div class="card shadow-lg border-0 rounded-4 p-4 animate-pop" style="background: #fffaf7; max-width: 420px; min-width: 320px;">
        <div class="alert alert-danger text-center rounded-4 mb-4" style="font-size: 1.15rem; border: none;">
            <i class="bi bi-exclamation-triangle-fill" style="font-size: 2rem;"></i><br>
            <strong>Are you sure you want to delete <span style="color:#d17a4b;">{{ product.name }}</span>?</strong>
            <div class="small text-muted mt-2">This action cannot be undone.</div>
        </div>
        <form method="post" class="d-flex flex-column gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger rounded-pill fw-bold shadow-sm">
                <i class="bi bi-trash"></i> Yes, Delete
            </button>
            <a href="{% url 'admin-product' %}" class="btn btn-outline-secondary rounded-pill fw-bold shadow-sm">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </form>
    </div>
</div>
<style>
    body {
        background: #fff !important;
    }
    .delete-modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(30, 30, 30, 0.18);
        z-index: 1050;
        min-height: 100vh;
        min-width: 100vw;
    }
    .card {
        background: #fffaf7 !important;
        border-radius: 2rem !important;
        box-shadow: 0 8px 32px rgba(209, 122, 75, 0.13), 0 2px 8px rgba(0,0,0,0.07);
        border: none;
    }
    .animate-pop {
        animation: popIn 0.25s cubic-bezier(.4,2,.6,1) both;
    }
    @keyframes popIn {
        0% { transform: scale(0.85); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
    .alert-danger {
        background: #ffe5e5 !important;
        color: #b95e2e !important;
        border: none !important;
    }
    .btn-danger {
        background: linear-gradient(90deg, #d17a4b 60%, #fbbf77 100%) !important;
        border: none;
    }
    .btn-outline-secondary {
        border-color: #d17a4b !important;
        color: #d17a4b !important;
        background: #fff !important;
    }
    .btn-outline-secondary:hover {
        background: #d17a4b !important;
        color: #fff !important;
    }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
{% endblock %}
